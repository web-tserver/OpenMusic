<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify-like Player with Discord Bot Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Main layout */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #000;
            padding: 24px 12px;
        }
        .sidebar h2 {
            color: #b3b3b3;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 4px;
            cursor: pointer;
            color: #b3b3b3;
            font-weight: 600;
            font-size: 14px;
        }
        .sidebar li:hover {
            color: white;
        }
        /* Main content */
        .main {
            flex: 1;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            overflow-y: auto;
            padding: 20px;
        }
        .main h1 {
            font-size: 32px;
            margin-bottom: 24px;
        }
        /* Search section */
        .search-section {
            padding: 0 0 20px 0;
            display: flex;
            gap: 10px;
        }
        #url-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 24px;
            background: #282828;
            color: white;
            font-size: 14px;
        }
        #url-input::placeholder {
            color: #b3b3b3;
        }
        #fetch-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 24px;
            background: #1db954;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #fetch-btn:hover {
            background: #1ed760;
        }
        #fetch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Song grid */
        .song-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }
        .song-card {
            background: #181818;
            border-radius: 6px;
            padding: 16px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .song-card:hover {
            background: #282828;
        }
        .song-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .song-card h3 {
            font-size: 16px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-card p {
            color: #b3b3b3;
            font-size: 14px;
        }
        /* Player bar */
        .player-bar {
            background: #181818;
            border-top: 1px solid #282828;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .player-left {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 30%;
        }
        .song-info h4 {
            font-size: 14px;
        }
        .song-info p {
            font-size: 12px;
            color: #b3b3b3;
        }
        .player-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 8px;
        }
        .controls button {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .controls button:hover {
            opacity: 1;
        }
        .progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: #535353;
            border-radius: 2px;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: #1db954;
            border-radius: 2px;
            width: 0%;
        }
        .player-right {
            width: 30%;
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li>Home</li>
                <li>Search</li>
                <li>Your Library</li>
            </ul>
        </div>
        <div class="main">
            <h1>Browse</h1>
            <!-- Search section (Discord‑bot style) -->
            <div class="search-section">
                <input type="text" id="url-input" placeholder="Search for a song or paste YouTube URL...">
                <button id="fetch-btn">Fetch & Play</button>
            </div>
            <div id="song-list" class="song-list"></div>
        </div>
    </div>
    <div class="player-bar">
        <div class="player-left">
            <img id="current-cover" src="https://via.placeholder.com/56" alt="cover" width="56" height="56" style="border-radius: 4px;">
            <div class="song-info">
                <h4 id="current-title">No song playing</h4>
                <p id="current-artist"></p>
            </div>
        </div>
        <div class="player-center">
            <div class="controls">
                <button id="prev">⏮</button>
                <button id="play-pause">▶</button>
                <button id="next">⏭</button>
            </div>
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="player-right">
            <!-- volume control could go here -->
        </div>
    </div>

    <script>
        // State
        let songs = [];
        let currentIndex = 0;
        const audio = new Audio();
        let isPlaying = false;

        // DOM elements
        const songListEl = document.getElementById('song-list');
        const playPauseBtn = document.getElementById('play-pause');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const progressBar = document.getElementById('progress-bar');
        const currentTitle = document.getElementById('current-title');
        const currentArtist = document.getElementById('current-artist');
        const currentCover = document.getElementById('current-cover');
        // Search elements
        const urlInput = document.getElementById('url-input');
        const fetchBtn = document.getElementById('fetch-btn');

        // Fetch static songs from server
        async function loadSongs() {
            try {
                const res = await fetch('/api/songs');
                songs = await res.json();
                renderSongs();
            } catch (err) {
                console.error('Failed to load songs', err);
            }
        }

        // Render song cards
        function renderSongs() {
            songListEl.innerHTML = songs.map((song, index) => `
                <div class="song-card" data-index="${index}">
                    <img src="${song.cover || 'https://via.placeholder.com/180'}" alt="${song.title}">
                    <h3>${song.title}</h3>
                    <p>${song.artist}</p>
                </div>
            `).join('');
            document.querySelectorAll('.song-card').forEach(card => {
                card.addEventListener('click', () => {
                    const idx = card.dataset.index;
                    playSong(parseInt(idx));
                });
            });
        }

        // Play song at given index
        function playSong(index) {
            if (index < 0 || index >= songs.length) return;
            currentIndex = index;
            const song = songs[currentIndex];
            audio.src = song.audioUrl; // e.g., '/audio/song.mp3' or '/downloads/...'
            audio.load();
            audio.play().then(() => {
                isPlaying = true;
                playPauseBtn.textContent = '⏸';
                updatePlayerInfo();
            }).catch(e => console.error('Playback failed', e));
        }

        // Update player info
        function updatePlayerInfo() {
            const song = songs[currentIndex];
            if (song) {
                currentTitle.textContent = song.title;
                currentArtist.textContent = song.artist;
                currentCover.src = song.cover || 'https://via.placeholder.com/56';
            }
        }

        // Toggle play/pause
        function togglePlay() {
            if (!songs.length) return;
            if (isPlaying) {
                audio.pause();
                playPauseBtn.textContent = '▶';
            } else {
                if (audio.src === '') {
                    playSong(0);
                } else {
                    audio.play();
                }
                playPauseBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        // Play next
        function playNext() {
            if (songs.length === 0) return;
            const nextIndex = (currentIndex + 1) % songs.length;
            playSong(nextIndex);
        }

        // Play previous
        function playPrev() {
            if (songs.length === 0) return;
            const prevIndex = (currentIndex - 1 + songs.length) % songs.length;
            playSong(prevIndex);
        }

        // Update progress
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
                durationEl.textContent = formatTime(audio.duration);
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function seek(e) {
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const seekTime = (clickX / width) * audio.duration;
            audio.currentTime = seekTime;
        }

        // ========== Discord‑bot style search ==========
        async function fetchAndPlay() {
            const query = urlInput.value.trim();
            if (!query) return;

            // Determine if input is a URL or a search term
            let urlToFetch;
            if (query.startsWith('http://') || query.startsWith('https://')) {
                urlToFetch = query; // it's a URL, use as is
            } else {
                // Treat as search term: prepend ytsearch:
                urlToFetch = `ytsearch:${query}`;
            }

            try {
                fetchBtn.disabled = true;
                fetchBtn.textContent = 'Fetching...';

                const response = await fetch('/api/fetch-audio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlToFetch })
                });

                const data = await response.json();

                if (data.success) {
                    // Create a temporary song object and add it to the list
                    const newSong = {
                        id: 'temp-' + Date.now(),
                        title: data.title,
                        artist: data.uploader,
                        cover: data.thumbnail || 'https://via.placeholder.com/180',
                        audioUrl: data.download_url, // URL to the temp file
                        duration: data.duration
                    };
                    
                    songs.push(newSong);
                    renderSongs();
                    
                    // Automatically play the new song
                    playSong(songs.length - 1);
                    
                    // Clear input for next search
                    urlInput.value = '';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Fetch failed:', error);
                alert('Failed to fetch audio. Check console.');
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch & Play';
            }
        }

        // Event listeners
        playPauseBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', playPrev);
        nextBtn.addEventListener('click', playNext);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
            updatePlayerInfo();
        });
        audio.addEventListener('ended', playNext);
        progressBar.addEventListener('click', seek);
        
        // Search button click
        fetchBtn.addEventListener('click', fetchAndPlay);
        
        // Allow pressing Enter in the input to trigger search
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchAndPlay();
            }
        });

        // Initial load of static songs
        loadSongs();
    </script>
</body>
</html>
